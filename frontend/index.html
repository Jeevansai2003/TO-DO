<!DOCTYPE html>
<html lang="en" ng-app="todoApp">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow Pro</title>

    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>

    <link rel="stylesheet" href="style.css">
    <script src="app.js"></script>
</head>

<body ng-controller="TodoController">

    <div class="background-glow"></div>

    <div class="app-container">

        <!-- TOP BAR -->
        <div class="top-bar">
            <div>
                <h1>To DO App</h1>
                <p>Smart productivity dashboard</p>
            </div>

            <div class="task-count">
                {{filtered.length}} Tasks
            </div>
        </div>


        <!-- VIEW SWITCH -->
        <div class="filter-section">
            <button ng-click="showActive()">Active Tasks</button>
            <button ng-click="showRecycleBin()">Recycle Bin</button>
        </div>


        <!-- INPUT SECTION -->
        <div class="task-input-section" ng-if="view=='active'">

            <input type="text"
                   ng-model="newTask.title"
                   placeholder="Enter task title">

            <textarea ng-model="newTask.description"
                      placeholder="Task description"></textarea>

            <input type="date"
                   ng-model="newTask.due_date">

            <select ng-model="newTask.priority">
                <option value="High">High Priority</option>
                <option value="Medium">Medium Priority</option>
                <option value="Low">Low Priority</option>
            </select>

            <button ng-click="addTask()">
                + Create Task
            </button>

        </div>


        <!-- FILTER BUTTONS -->
        <div class="filter-section" ng-if="view=='active'">

            <button ng-click="showAll()">All</button>

            <button ng-click="showCompleted()">
                Completed
            </button>

            <button ng-click="showPending()">
                Pending
            </button>

            <button ng-click="showCancelled()">
                Cancelled
            </button>

        </div>


        <!-- TASK LIST -->
        <div class="task-grid">

            <div class="task-card"
                 ng-repeat="task in filtered"
                 ng-class="{
                    'done': task.status == 1 || task.status == '1',
                    'cancelled': task.status == 2 || task.status == '2'
                 }">

                <!-- TOP -->
                <div class="card-top">

                    <div class="status-section" ng-if="view=='active'">

                        <input type="checkbox"
                               ng-if="task.status != 2 && task.status != '2'"
                               ng-checked="task.status == 1 || task.status == '1'"
                               ng-click="toggleComplete(task)">

                        <span ng-if="task.status == 0 || task.status == '0'">
                            In Progress
                        </span>

                        <span ng-if="task.status == 1 || task.status == '1'">
                            Completed
                        </span>

                        <span ng-if="task.status == 2 || task.status == '2'">
                            Cancelled
                        </span>

                    </div>

                </div>


                <!-- BODY -->
                <div class="card-body">

                    <!-- PRIORITY -->
                    <div class="priority-tag {{task.priority.toLowerCase()}}">
                        {{task.priority}} Priority
                    </div>

                    <!-- TITLE -->
                    <h2 ng-if="!task.editing">
                        {{task.title}}
                    </h2>

                    <input class="edit-field"
                           ng-if="task.editing && view=='active'"
                           ng-model="task.title"
                           ng-disabled="task.status != 0 && task.status != '0'">


                    <!-- DESCRIPTION -->
                    <p ng-if="!task.editing">
                        {{task.description}}
                    </p>

                    <textarea class="edit-field"
                              ng-if="task.editing && view=='active'"
                              ng-model="task.description"
                              ng-disabled="task.status != 0 && task.status != '0'">
                    </textarea>


                    <!-- DUE DATE -->
                    <div class="task-date">
                        📅 Due Date:
                        {{task.due_date | date:'dd-MM-yyyy'}}
                    </div>

                </div>


                <!-- ACTIONS -->
                <div class="card-actions">

                    <!-- ACTIVE VIEW -->
                    <div ng-if="view=='active'">

                        <button class="edit"
                                ng-click="task.status == 0 || task.status == '0' ? (task.editing = true) : null"
                                ng-disabled="task.status != 0 && task.status != '0'">
                            Edit
                        </button>

                        <button class="save"
                                ng-if="task.editing && (task.status == 0 || task.status == '0')"
                                ng-click="updateTask(task)">
                            Save
                        </button>

                        <button class="delete"
                                ng-click="deleteTask(task.id)">
                            Delete
                        </button>

                        <button class="cancel"
                                ng-click="markCancelled(task)"
                                ng-disabled="task.status != 0 && task.status != '0'">
                            Cancel Task
                        </button>

                    </div>


                    <!-- RECYCLE BIN -->
                    <div ng-if="view=='recycle'">

                        <button class="save"
                                ng-click="restoreTask(task.id)">
                            Restore
                        </button>

                    </div>

                </div>

            </div>

        </div>

    </div>

</body>
</html>
